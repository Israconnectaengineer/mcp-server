version: "3.9"

services:
  whatsapp-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whatsapp-mcp-server
    restart: unless-stopped

    ports:
      - "4500:3000"   # External port 4500 maps to internal 3000

    volumes:
      # WhatsApp session persisted across restarts
      - whatsapp_session:/app/session

    environment:
      PORT: "3000"
      SESSION_PATH: "/app/session"
      NODE_ENV: "production"
      POKE_API_KEY: "${POKE_API_KEY}"
      POKE_API_URL: "${POKE_API_URL:-https://poke.com/api/v1/inbound/api-message}"
      # Set these in a .env file or override at deploy time:
      WEBHOOK_URL: "${WEBHOOK_URL}"        # optional — only needed if forwarding to another service
      WEBHOOK_SECRET: "${WEBHOOK_SECRET}"  # shared secret — sent as x-webhook-secret header

    # Required for Chromium inside Docker
    security_opt:
      - seccomp:unconfined
    shm_size: "256mb"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  whatsapp_session:
    driver: local
